apiVersion: v1
kind: Service
metadata:
  name: zone-configurator
  namespace: homeassistant
spec:
  selector:
    app: zone-configurator
  ports:
    - name: http
      port: 8099
      targetPort: http
---
# Firmware delivery to LAN ESP devices needs an externally reachable port. The
# web UI is fronted by the cluster's nginx Ingress, but ESPs fetch firmware
# directly over HTTP, so we expose a NodePort.
apiVersion: v1
kind: Service
metadata:
  name: zone-configurator-firmware
  namespace: homeassistant
spec:
  type: NodePort
  selector:
    app: zone-configurator
  ports:
    - name: firmware
      port: 30808
      targetPort: firmware
      nodePort: 30808
