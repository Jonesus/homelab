apiVersion: v1
kind: Service
metadata:
  name: rethink
  namespace: homeassistant
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.1.212"
spec:
  type: LoadBalancer
  selector:
    app: rethink
  ports:
    # 443 is what the appliance hits for common.lgthinq.com during the
    # post-pairing setup handshake; rethink-cloud listens on 4433 (avoids
    # root) so we map externally.
    - name: thinq2-cloud
      port: 443
      targetPort: 4433
    - name: thinq2-https
      port: 4433
      targetPort: 4433
    - name: thinq1-https
      port: 46030
      targetPort: 46030
    - name: thinq1-tls
      port: 47878
      targetPort: 47878
    # Appliance MQTTS endpoint (rethink-cloud bridges from here to the HA
    # broker). /route tells the appliance to use ssl://rethink.lan:8884 — if
    # this isn't exposed, the appliance can't open its persistent session.
    - name: thinq2-mqtts
      port: 8884
      targetPort: 8884
    - name: management
      port: 44401
      targetPort: 44401
