apiVersion: apps/v1
kind: Deployment
metadata:
  name: rethink
  namespace: homeassistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rethink
  template:
    metadata:
      labels:
        app: rethink
    spec:
      containers:
        - name: rethink
          # ghcr.io/anszom/rethink has only a `:dev` tag — no `:latest` is
          # published (no stable release has been cut as of 2026-05).
          image: ghcr.io/anszom/rethink:dev
          ports:
            - containerPort: 4433
              name: thinq2-https
            - containerPort: 46030
              name: thinq1-https
            - containerPort: 47878
              name: thinq1-tls
            - containerPort: 44401
              name: management
          volumeMounts:
            # rethink-cloud reads /app/config.json (its working dir is /app)
            # and ignores anything at /config — subPath-mount to overwrite
            # the image's default in-place.
            - mountPath: /app/config.json
              subPath: config.json
              name: config
              readOnly: true
            # Overlay /app/dist/cloud/ha_bridge.js with a patched copy that
            # registers our LG washer/dryer combo (CV74J7S2QA → F_VB_F___W.B_2QEUK)
            # and ship the corresponding device handler that decodes the
            # additional dose / option / child-lock state. See overlays/*.js
            # + kustomization.yaml. Both come from the same configmap
            # (rethink-ha-bridge).
            - mountPath: /app/dist/cloud/ha_bridge.js
              subPath: ha_bridge.js
              name: ha-bridge
              readOnly: true
            - mountPath: /app/dist/cloud/devices/F_VB_F___W.B_2QEUK.js
              subPath: F_VB_F___W.B_2QEUK.js
              name: ha-bridge
              readOnly: true
            - mountPath: /state
              name: state
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: rethink-config
        - name: ha-bridge
          configMap:
            name: rethink-ha-bridge
        - name: state
          persistentVolumeClaim:
            claimName: rethink-state-pvc
