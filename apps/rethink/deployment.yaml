apiVersion: apps/v1
kind: Deployment
metadata:
  name: rethink
  namespace: homeassistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rethink
  template:
    metadata:
      labels:
        app: rethink
    spec:
      containers:
        - name: rethink
          # ghcr.io/anszom/rethink has only a `:dev` tag — no `:latest` is
          # published (no stable release has been cut as of 2026-05).
          image: ghcr.io/anszom/rethink:dev
          ports:
            - containerPort: 4433
              name: thinq2-https
            - containerPort: 46030
              name: thinq1-https
            - containerPort: 47878
              name: thinq1-tls
            - containerPort: 44401
              name: management
          volumeMounts:
            # rethink-cloud reads /app/config.json (its working dir is /app)
            # and ignores anything at /config — subPath-mount to overwrite
            # the image's default in-place.
            - mountPath: /app/config.json
              subPath: config.json
              name: config
              readOnly: true
            - mountPath: /state
              name: state
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: rethink-config
        - name: state
          persistentVolumeClaim:
            claimName: rethink-state-pvc
