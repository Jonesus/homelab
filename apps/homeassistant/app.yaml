apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homeassistant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: homeassistant
    server: https://kubernetes.default.svc
  project: apps
  source:
    chart: home-assistant
    repoURL: http://pajikos.github.io/home-assistant-helm-chart/
    targetRevision: 0.3.25
    helm:
      releaseName: home-assistant
      valuesObject:
        image:
          tag: "2026.4.4"

        ingress:
          enabled: true
          className: "nginx"
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            nginx.ingress.kubernetes.io/proxy-body-size: 100m
          tls:
            - secretName: homeassistant-cluster-tls
              hosts:
                - hassio.boiss.it
          hosts:
            - host: hassio.boiss.it
              paths:
                - path: /
                  pathType: ImplementationSpecific
            - host: hass.home
              paths:
                - path: /
                  pathType: ImplementationSpecific

        configuration:
          enabled: true
          forceInit: false

        podSecurityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch

        # Normalize /config perms so the codeserver sidecar (uid 1000) can write
        # files owned by the HA container (uid 0). The setgid bit on /config
        # already pins group=coder; this ensures the group has write.
        initContainers:
          - name: fix-config-perms
            image: busybox:1.36
            command: ["sh", "-c", "chmod -R g+w /config"]
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: home-assistant
                mountPath: /config

        addons:
          codeserver:
            enabled: true

        persistence:
          enabled: true
          storageClass: iscsi

        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
