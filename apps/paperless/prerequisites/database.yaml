apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-postgres
  namespace: paperless
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1

  postgresql:
    enableAlterSystem: true

  managed:
    roles:
      - name: paperless
        superuser: false
        login: true

  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-postgres-user
      postInitSQL:
        - CREATE DATABASE paperless OWNER paperless;
        - ALTER DATABASE paperless SET search_path TO public;
        - GRANT ALL PRIVILEGES ON DATABASE paperless TO paperless;

  storage:
    pvcTemplate:
      storageClassName: iscsi
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
